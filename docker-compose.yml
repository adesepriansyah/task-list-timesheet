# ============================================
# DOCKER COMPOSE - Task List Timesheet
# ============================================

services:
  # FRONTEND SERVICE
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_BASE_URL=http://localhost:3020/api
        - NEXT_PUBLIC_APP_URL=http://localhost:3010
    container_name: task-list-timesheet-fe
    restart: unless-stopped
    ports:
      - "3010:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - NEXT_PUBLIC_APP_URL=http://localhost:3010
      - NEXT_PUBLIC_API_BASE_URL=http://localhost:3020/api
    networks:
      - task-timesheet-network

networks:
  task-timesheet-network:
    driver: bridge
