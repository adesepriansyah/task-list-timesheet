services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: task-list-timesheet
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - NEXT_PUBLIC_APP_URL=http://localhost:3000
      - NEXT_PUBLIC_API_BASE_URL=http://localhost:3001/api
